name: 自動掃描訊號

on:
  schedule:
    # 每 15 分鐘執行一次（UTC 時間）
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:  # 也可以手動觸發

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許寫入 signals.json 回 GitHub

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 執行訊號掃描
        run: python fetcher.py

      - name: 把 signals.json 推回 GitHub
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.json
          git diff --staged --quiet || git commit -m "🤖 自動更新訊號 $(date '+%Y/%m/%d %H:%M') UTC"
          git push
